<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Success</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #088178, #0ab39c);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .success-container {
        background: #fff;
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 90%;
      }

      .success-icon {
        font-size: 60px;
        color: #088178;
        margin-bottom: 20px;
      }

      h1 {
        margin-bottom: 10px;
        color: #333;
      }

      p {
        color: #666;
        margin-bottom: 25px;
      }

      .btn {
        display: inline-block;
        padding: 12px 25px;
        background: #088178;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
      }

      .btn:hover {
        background: #066e65;
      }
    </style>
  </head>

  <body>
    <div class="success-container">
      <div class="success-icon">✅</div>

      <h1>Order Placed Successfully!</h1>
      <p>Thank you for your purchase. Your order has been confirmed.</p>

      <a href="index.html" class="btn">Continue Shopping</a>
    </div>
  </body>
</html>
